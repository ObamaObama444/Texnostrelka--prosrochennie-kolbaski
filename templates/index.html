<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BookVerse - Моя библиотека</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ request.url_for('static', path='legacy/library.css') }}?v={{ asset_version }}">
    <link rel="stylesheet" href="{{ request.url_for('static', path='legacy/bridge.css') }}?v={{ asset_version }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><text y='1em' font-size='2em'>📚</text></svg>">
</head>
<body>
    <nav class="main-nav">
        <div class="nav-brand">
            <span class="logo-icon">📚</span>
            <h1 class="logo-text">BookVerse</h1>
        </div>

        <div class="nav-actions">
            <button class="upload-btn" id="uploadButton" title="Добавить книгу">
                <span class="icon-text">+</span>
                <span>Добавить книгу</span>
            </button>
            <button class="menu-btn" id="menuButton">
                <span class="icon-text">☰</span>
            </button>
        </div>
    </nav>

    <main class="content-wrapper">
        <header class="content-header">
            <h2 class="page-title">Моя библиотека</h2>
            <div class="filters-container">
                <div class="search-container">
                    <div class="search-bar">
                        <input type="text" placeholder="Поиск по книгам..." id="library-search-input">
                        <span class="search-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"/>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                            </svg>
                        </span>
                    </div>
                </div>
                <div class="sort-filter">
                    <select id="sort-by">
                        <option value="date">По дате добавления</option>
                        <option value="title">По названию</option>
                        <option value="status">По статусу</option>
                    </select>
                </div>
            </div>
        </header>

        <div id="loading" class="loading-indicator" style="display: none;">
            <div class="spinner"></div>
            <span>Загрузка книг...</span>
        </div>

        <div id="error-message" class="error-message" style="display: none;"></div>

        <section class="books-grid" id="books-grid"></section>

        <div id="empty-state" class="empty-state" style="display: none;">
            <div class="empty-illustration">📚</div>
            <h2>Ваша библиотека пуста</h2>
            <p>Начните демонстрацию кейса с загрузки первой книги</p>
            <button class="upload-cta-btn" id="uploadCtaBtn">Загрузить книгу</button>
        </div>
    </main>

    <aside class="side-panel right-panel" id="right-panel">
        <div class="panel-content" id="panel-content">
            <div class="panel-header">
                <div class="user-profile">
                    <div class="user-info">
                        <h3 class="username">BookVerse Case</h3>
                        <p class="user-email">{{ provider_name }} · {{ "Mistral configured" if llm_available else "Mistral not configured" }}</p>
                    </div>
                </div>
                <button class="close-btn" id="closeBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <nav class="panel-nav">
                <ul class="menu-list">
                    <li>
                        <button class="menu-item" id="showToolsBtn">
                            <span class="icon">🧠</span>
                            <span class="text">Инструменты</span>
                        </button>
                    </li>
                    <li>
                        <button class="menu-item" id="showOverviewBtn">
                            <span class="icon">📊</span>
                            <span class="text">Обзор</span>
                        </button>
                    </li>
                </ul>
            </nav>

            <div class="logout-section">
                <button class="menu-item logout-btn" id="refreshBooksBtn">
                    <span class="icon">↻</span>
                    <span class="text">Обновить книги</span>
                </button>
            </div>

            <section class="panel-screen" id="panel-screen"></section>
        </div>
    </aside>

    <div class="modal-overlay" id="upload-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Добавить книгу</h3>
                <button class="close-btn" id="closeModalBtn">✕</button>
            </div>
            <div class="modal-body">
                <div class="upload-zone" id="drop-zone">
                    <input type="file" id="file-input" accept=".fb2,.txt">
                    <label for="file-input" class="upload-label">
                        <div class="upload-icon">📤</div>
                        <p>Перетащите файлы сюда<br>или нажмите для выбора</p>
                        <span class="file-types">Поддерживаемые форматы: FB2, TXT</span>
                    </label>
                </div>
                <div style="margin-top: 12px; display: flex; justify-content: center;">
                    <button class="upload-cta-btn" id="uploadNowBtn" type="button">Загрузить выбранный файл</button>
                </div>
                <div class="upload-progress">
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: 0%"></div>
                    </div>
                    <span class="progress-text">0%</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.BOOKVERSE_CONFIG = {
            llmAvailable: {{ "true" if llm_available else "false" }},
            demoQueries: {{ demo_queries | tojson }},
            embeddingBackend: {{ embedding_backend | tojson }},
            providerName: {{ provider_name | tojson }},
            chatModel: {{ chat_model | tojson }},
            embedModel: {{ embed_model | tojson }}
        };
    </script>
    <script src="{{ request.url_for('static', path='legacy/app.js') }}?v={{ asset_version }}" defer></script>
</body>
</html>
